services:
  - type: web
    name: ercot-meetings
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python startup.py && gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: DB_RELEASE_URL
        sync: false
      - key: SERVE_LOCAL_DOCS
        value: "false"
